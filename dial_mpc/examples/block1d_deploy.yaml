# Terminal 1: DISPLAY=:99 dial-mpc-sim --example block1d_deploy (access viz at http://127.0.0.1:6080/vnc.html)
# Terminal 2: dial-mpc-plan --example block1d_deploy
# Layout = block1d.yaml + the DialSimConfig fields, mirroring unitree_go2_trot_deploy.yaml.
# Solver/env/task values are unchanged from block1d.yaml (provenance documented there);
# only deploy-specific differences are annotated. Requires "block1d_deploy" in
# deploy_examples (examples/__init__.py) and the act2ctrl hook in dial_plan.py:224.
# run rm -f /dev/shm/*_shm if there is shared memory leftover from a prev run.

# ---- DIAL-MPC run ----
seed: 0
output_dir: block1d
n_steps: 200 # unused in deploy: both loops run until Ctrl-C (dial_sim.py / dial_plan.py)

env_name: block1d
Nsample: 512
Hsample: 15 # action buffer n_acts = Hsample + 1 (self.n_acts, dial_plan.py:86)
Hnode: 4
Ndiffuse:
  1 # deploy convention: 1 annealing iteration per replan, for latency (the go2
  # deploy twin also drops it vs sync); raise to 2 if tracking gets sloppy
Ndiffuse_init: 10
temp_sample: 0.1
horizon_diffuse_factor: 0.9
traj_diffuse_factor: 0.45
update_method: mppi

# ---- Base environment (planner's rollout model) ----
dt: 0.02
timestep: 0.02 # planner integrates its rollouts at 0.02 (n_frames = 1, base_env.py:18)
leg_control: torque
action_scale: 1.0

# ---- Task fields ----
vel_target: 0.3
w_vel: 30.0
w_ctrl: 0.001
block_init_x: 0.25 # async IGNORES these two: both processes start from the xml "home"
ee_init_x:
  -0.04 # keyframe (mj_resetDataKeyframe, dial_sim.py:71; default_q =
  # keyframe("home"), dial_plan.py:89). IC sweeps in async mode
  # mean editing the keyframe in block1d.xml.

# ---- Sim process (DialSimConfig, dial_mpc/deploy/dial_sim.py:30-39; all required) ----
robot_name: "block1d" # model dir under dial_mpc/models/ (get_model_path arg 1)
scene_name: "block1d.xml" # model file; block1d has no separate scene wrapper xml
sim_leg_control:
  torque # sim applies the tau_shm buffer as ctrl; with the act2ctrl hook
  # (dial_plan.py:224) that buffer holds clipped [-1,1] ctrl values,
  # the same mapping as Block1DEnv.step
plot: false # REQUIRED false: live plotter hardcodes 4 joints (n_plot_joint, dial_sim.py:68); we have 1
record: false # true dumps [t, qpos, qvel, ctrl] rows to output_dir as .npy on exit
real_time_factor: 1.0 # wall-clock pacing of the sim loop
sim_dt:
  0.005 # sim physics step = the xml/MJPC value (block1d.xml <option timestep>,
  # agent_timestep numeric in task_push.xml:20).
  # NOTE: 4x finer than the planner's rollout timestep (0.02 above) -- the sim
  # is higher-fidelity than the model the planner plans with, by design.
sync_mode: false # false = true async (sim never waits); true = lockstep debug mode


# If you can't connect to http://localhost:6080/vnc.html run:
# pkill -f 'websockify.*6080' 2>/dev/null
# pkill -f 'x11vnc.*5900' 2>/dev/null
# Xvfb :99 -screen 0 1280x1024x24 &
# x11vnc -display :99 -forever -nopw -localhost -rfbport 5900 &
# websockify --web=/usr/share/novnc 6080 localhost:5900 &
