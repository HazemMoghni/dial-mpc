# block1d_lcm.yaml: DIAL-MPC driving the EXTERNAL Drake sim (c3-lcs) over LCM.
# Terminal 1 (c3-lcs repo root): ./bazel-bin/examples/block1d/block_sim
# Terminal 2 (anywhere):         dial-mpc-lcm-bridge --example block1d_lcm
# Or one command for sweeps: c3-lcs/analysis/dial_block_experiments_log.py.
# Unlike block1d_deploy.yaml there is no internal sim process; the env here is only the
# planner's rollout model. Solver/env/task values unchanged from block1d_deploy.yaml.
# Requires "block1d_lcm" in deploy_examples (examples/__init__.py).

# ---- DIAL-MPC run ----
seed: 0
output_dir: block1d
n_steps: 200 # unused: bridge runs until Ctrl-C

# Solver constants aligned with the MJPC 1d-experiment settings (fair comparison:
# same horizon, same spline resolution, same internal integration step). MJPC values
# from mujoco_mpc/.../standalone_block_push.cc flags as swept by
# c3-lcs/analysis/mjpc_block_experiments_log.py (horiz_val = 0.4, dt = 0.005).
env_name: block1d
Nsample: 512 # DIAL-specific (GPU sampling budget; MJPC PS uses 50 CPU rollouts -- not a
             # fairness target). Cut from the 2048 legged-robot default: the 1D search
             # space is only (Hnode+1) x nu = 5 dims, and a smaller batch keeps replan
             # latency low, which IS comparable across async controllers.
Hsample: 20 # horizon 20 x 0.02 = 0.4 s = MJPC's t_horizon in the sweeps
Hnode: 4 # Hnode+1 = 5 spline knots = MJPC sampling_spline_points (task_push.xml:23)
Ndiffuse: 2 # annealing iterations per replan; THE swept "annealing" knob
            # (dial_experiments_1d_anneal.yaml); this is the fixed value for sigma sweeps
Ndiffuse_init: 10
temp_sample: 0.05
horizon_diffuse_factor: 0.9
traj_diffuse_factor: 0.5
update_method: mppi
sigma_scale: 1.0 # global noise scale; scales MBDPI.sigma_control (dial_core.py:63-70);
                 # THE swept "noise" knob (dial_experiments_1d.yaml)

# ---- Base environment (planner's rollout model) ----
dt: 0.02 # MUST stay 0.02: MBDPI hardcodes self.ctrl_dt = 0.02 (dial_core.py:74) and the
         # bridge asserts they match.
timestep: 0.005 # rollout-model physics step = MJPC's agent_timestep in the sweeps
                # (--dt 0.005) = block1d.xml <option timestep>. n_frames = dt/timestep
                # = 4 substeps per control step (base_env.py:18).
leg_control: torque
action_scale: 1.0

# ---- Task fields ----
vel_target: 0.3
w_vel: 30.0
w_ctrl: 0.001
block_init_x: 0.25 # rollout-model keyframe only. The ACTUAL initial condition lives in
ee_init_x: -0.04   # c3-lcs/.../block1d/parameters/test_matrix/block_sim_params.yaml
                   # (q_init / q_init_block), patched per trial by the orchestrator.

# ---- LCM bridge (DialLcmConfig, dial_mpc/deploy/dial_lcm_bridge.py) ----
# channel names = c3-lcs/.../block1d/parameters/lcm_channels_simulation.yaml
robot_state_channel: ROBOT_STATE_SIMULATION # lcmt_robot_output, from block_sim @ 1000 Hz
block_state_channel: BLOCK_STATE_SIMULATION # lcmt_object_state, from block_sim
traj_channel: INPUT_TRAJ # lcmt_trajectory_block, published by the bridge each replan
robot_input_channel: ROBOT_INPUT # subscribe-only (logs what the sim applied); block_sim's
                                 # own SplineToRobotCommand publishes here, never us
lcm_url: "udpm://239.255.76.67:7669?ttl=0" # PRIVATE bus, host-local. LCM's default URL
        # (port 7667) is one shared multicast group for the whole machine -- anyone else's
        # sim/controller cross-talks (observed: a second block_sim's clock 305 s ahead fed
        # our spline tracker => extrapolated NaN forces). block_sim must be launched with
        # LCM_DEFAULT_URL set to this same URL; analysis/run_block1d_sim.py does that.
state_timeout_s: 0.5 # warn if no robot state for this long (sim presumed down)
record: true # dump [plan_time, qpos, qvel, u0] + applied inputs to output_dir on exit
